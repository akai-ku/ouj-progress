
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>放送大学 学習進捗</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #212127;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0eff2;
    --muted: #7a7a8a;
    --green: #3ecf8e;
    --green-dim: rgba(62,207,142,0.15);
    --amber: #f5a623;
    --amber-dim: rgba(245,166,35,0.15);
    --blue: #5b8dee;
    --accent: #3ecf8e;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(15,15,17,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--green);
    letter-spacing: 0.05em;
  }
  .logo span { color: var(--muted); }
  .add-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 16px;
    background: var(--green);
    color: #0f1a14;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .add-btn:hover { opacity: 0.85; }

  /* MAIN */
  main { max-width: 820px; margin: 0 auto; padding: 2rem 1rem 4rem; }

  /* SUMMARY */
  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 2rem;
  }
  .sum-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    text-align: center;
  }
  .sum-num {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }
  .sum-num.green { color: var(--green); }
  .sum-lbl { font-size: 11px; color: var(--muted); }

  /* SUBJECT CARD */
  .subject-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .subject-card:hover { border-color: var(--border2); }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .subject-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    border: none;
    background: none;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
    max-width: 260px;
  }
  .subject-name:focus {
    border-bottom: 1px solid var(--green);
    color: var(--text);
  }
  .card-right { display: flex; align-items: center; gap: 10px; }
  .pct-badge {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--green);
    background: var(--green-dim);
    padding: 3px 10px;
    border-radius: 20px;
  }
  .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 16px; line-height: 1;
    padding: 2px 4px; border-radius: 4px;
    transition: color 0.15s;
  }
  .del-btn:hover { color: #e55; }

  /* PROGRESS BAR */
  .prog-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green) 0%, #5beed8 100%);
    border-radius: 2px;
    transition: width 0.35s ease;
  }

  /* SECTIONS */
  .section-row { margin-bottom: 12px; }
  .sec-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* LECTURE BUTTONS */
  .lec-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .lec {
    width: 34px; height: 34px;
    border-radius: 7px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-weight: 500;
  }
  .lec:hover { border-color: var(--green); color: var(--green); }
  .lec.done {
    background: var(--green-dim);
    border-color: var(--green);
    color: var(--green);
  }

  /* STATUS BUTTONS */
  .status-row { display: flex; gap: 6px; }
  .stat-btn {
    flex: 1;
    padding: 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .stat-btn:hover { border-color: var(--border2); color: var(--text); }
  .stat-btn.doing {
    background: var(--amber-dim);
    border-color: var(--amber);
    color: var(--amber);
  }
  .stat-btn.done {
    background: var(--green-dim);
    border-color: var(--green);
    color: var(--green);
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 1.75rem;
    width: 90%;
    max-width: 380px;
    animation: fadeUp 0.2s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .modal h3 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; }
  .modal input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.15s;
  }
  .modal input:focus { border-color: var(--green); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btns button {
    padding: 8px 18px;
    border-radius: var(--radius-sm);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: none;
    color: var(--muted);
    transition: all 0.15s;
  }
  .modal-btns .primary {
    background: var(--green);
    color: #0f1a14;
    border-color: var(--green);
    font-weight: 700;
  }
  .modal-btns button:hover { opacity: 0.8; }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.8;
  }
  .empty .emoji { font-size: 32px; margin-bottom: 12px; }

  @media (max-width: 480px) {
    .summary { grid-template-columns: repeat(3,1fr); }
    .sum-num { font-size: 22px; }
    .subject-name { font-size: 14px; max-width: 180px; }
  }
</style>
</head>















<body>

<header>
  <div class="logo">hoso<span>.track</span></div>
  <div style="display: flex; gap: 8px;">
    <button class="add-btn" id="exportBtn" style="background: var(--surface2); color: var(--text); border: 1px solid var(--border2);">📤 保存</button>
    <button class="add-btn" id="openModal">＋ 科目を追加</button>
  </div>
</header>

<main>
  <div class="summary" id="summary"></div>
  <div id="subjectList"></div>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>科目を追加</h3>
    <input type="text" id="subjectInput" placeholder="科目名（例：日本語概説）" maxlength="30" />
    <div class="modal-btns">
      <button id="cancelModal">キャンセル</button>
      <button class="primary" id="confirmModal">追加する</button>
    </div>
  </div>
</div>









<script>
const KEY = 'hoso_v3';
const ENDPOINT = 'https://script.google.com/macros/s/AKfycbzOpE7Jr-oORU8TPD3d2u04EPITIHa-laMXMeTsX0Y0Bw-FREyxa64eAjm7rjlAq3vq/exec'; 

// --- データ処理 ---
function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; }
}
function save(data) {
  localStorage.setItem(KEY, JSON.stringify(data));
}

let subjects = load();

function pct(s) {
  const done = s.lectures.filter(Boolean).length
    + (s.tsushin === 'done' ? 1 : 0)
    + (s.unit === 'done' ? 1 : 0);
  return Math.round(done / 17 * 100);
}

// --- 描画処理 ---
function renderSummary() {
  const total = subjects.length;
  const completed = subjects.filter(s => pct(s) === 100).length;
  const lecsDone = subjects.reduce((a, s) => a + s.lectures.filter(Boolean).length, 0);
  document.getElementById('summary').innerHTML = `
    <div class="sum-card">
      <div class="sum-num">${total}</div>
      <div class="sum-lbl">登録科目</div>
    </div>
    <div class="sum-card">
      <div class="sum-num green">${completed}</div>
      <div class="sum-lbl">修了済み</div>
    </div>
    <div class="sum-card">
      <div class="sum-num">${lecsDone}</div>
      <div class="sum-lbl">視聴済み回数</div>
    </div>
  `;
}

function renderSubjects() {
  const list = document.getElementById('subjectList');
  if (!subjects.length) {
    list.innerHTML = `<div class="empty"><div class="emoji">📚</div>まだ科目が登録されていません。<br>「＋ 科目を追加」から始めましょう。</div>`;
    return;
  }
  list.innerHTML = '';
  subjects.forEach(s => {
    const p = pct(s);
    const card = document.createElement('div');
    card.className = 'subject-card';

    const lecs = s.lectures.map((done, i) =>
      `<button class="lec ${done ? 'done' : ''}" data-id="${s.id}" data-i="${i}">${String(i+1).padStart(2,'0')}</button>`
    ).join('');

    const tsH = (v, label) =>
      `<button class="stat-btn ${s.tsushin===v ? (v==='doing'?'doing':'done') : ''}" data-id="${s.id}" data-f="tsushin" data-v="${v}">${label}</button>`;
    const unH = (v, label) =>
      `<button class="stat-btn ${s.unit===v ? (v==='doing'?'doing':'done') : ''}" data-id="${s.id}" data-f="unit" data-v="${v}">${label}</button>`;

    card.innerHTML = `
      <div class="card-header">
        <input class="subject-name" value="${s.name}" data-id="${s.id}" />
        <div class="card-right">
          <span class="pct-badge">${p}%</span>
          <button class="del-btn" data-del="${s.id}">×</button>
        </div>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${p}%"></div></div>
      <div class="section-row">
        <div class="sec-label">授業 — 全15回</div>
        <div class="lec-grid">${lecs}</div>
      </div>
      <div class="section-row">
        <div class="sec-label">通信指導</div>
        <div class="status-row">${tsH('doing','提出中')}${tsH('done','提出済み')}</div>
      </div>
      <div class="section-row">
        <div class="sec-label">単位認定試験</div>
        <div class="status-row">${unH('doing','受験予定')}${unH('done','受験済み')}</div>
      </div>
    `;
    list.appendChild(card);
  });

  // イベント登録（カード内）
  list.querySelectorAll('.lec').forEach(b => b.addEventListener('click', () => {
    const s = subjects.find(x => x.id === b.dataset.id);
    s.lectures[+b.dataset.i] = !s.lectures[+b.dataset.i];
    save(subjects); render();
  }));
  list.querySelectorAll('.stat-btn').forEach(b => b.addEventListener('click', () => {
    const s = subjects.find(x => x.id === b.dataset.id);
    s[b.dataset.f] = s[b.dataset.f] === b.dataset.v ? 'none' : b.dataset.v;
    save(subjects); render();
  }));
  list.querySelectorAll('.del-btn').forEach(b => b.addEventListener('click', () => {
    if (confirm('この科目を削除しますか？')) {
      subjects = subjects.filter(x => x.id !== b.dataset.del);
      save(subjects); render();
    }
  }));
  list.querySelectorAll('.subject-name').forEach(inp => inp.addEventListener('change', () => {
    const s = subjects.find(x => x.id === inp.dataset.id);
    s.name = inp.value.trim() || s.name;
    save(subjects); render();
  }));
}

function render() { 
  renderSummary(); 
  renderSubjects(); 
}

// --- 画面起動時の処理 ---
window.addEventListener('DOMContentLoaded', () => {
  render();

  // 1. 保存ボタンの設定
  const exportBtn = document.getElementById('exportBtn');
  if (exportBtn) {
    exportBtn.addEventListener('click', async () => {
      if (subjects.length === 0) return alert('保存するデータがありません。');
      try {
        exportBtn.innerText = '保存中...';
        exportBtn.style.opacity = '0.5';
        await fetch(ENDPOINT, {
          method: 'POST',
          mode: 'no-cors', 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(subjects)
        });
        alert('送信リクエストを完了しました！');
      } catch (e) {
        alert('エラーが発生しました。');
      } finally {
        exportBtn.innerText = '📤 保存';
        exportBtn.style.opacity = '1';
      }
    });
  }

  // 2. モーダル処理の設定
  const overlay = document.getElementById('modalOverlay');
  const input = document.getElementById('subjectInput');
  const openBtn = document.getElementById('openModal');
  const cancelBtn = document.getElementById('cancelModal');
  const confirmBtn = document.getElementById('confirmModal');

  if (openBtn) {
    openBtn.addEventListener('click', () => {
      overlay.classList.add('open'); 
      input.value = ''; 
      input.focus();
    });
  }
  if (cancelBtn) {
    cancelBtn.addEventListener('click', () => overlay.classList.remove('open'));
  }
  if (overlay) {
    overlay.addEventListener('click', e => { 
      if (e.target === overlay) overlay.classList.remove('open'); 
    });
  }

  function addSubject() {
    const name = input.value.trim();
    if (!name) return;
    subjects.push({ 
      id: crypto.randomUUID(), 
      name, 
      lectures: Array(15).fill(false), 
      tsushin: 'none', 
      unit: 'none' 
    });
    save(subjects); 
    render();
    overlay.classList.remove('open');
  }

  if (confirmBtn) confirmBtn.addEventListener('click', addSubject);
  if (input) {
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addSubject(); });
  }
});
</script>
</body>
